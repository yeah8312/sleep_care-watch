<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nocturnal Science - Wear OS Connection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#2f3132",
                    "on-tertiary-fixed-variant": "#004e59",
                    "on-error-container": "#ffdad6",
                    "on-surface": "#e2e2e4",
                    "primary": "#bdc2ff",
                    "outline": "#908f9d",
                    "on-surface-variant": "#c6c5d4",
                    "secondary-fixed-dim": "#bac3ff",
                    "on-primary-container": "#8690ee",
                    "on-secondary-fixed-variant": "#293ca0",
                    "primary-container": "#1a237e",
                    "secondary": "#bac3ff",
                    "surface-container": "#1e2021",
                    "on-error": "#690005",
                    "on-background": "#e2e2e4",
                    "primary-fixed-dim": "#bdc2ff",
                    "surface-container-high": "#282a2c",
                    "surface-container-highest": "#333537",
                    "surface-bright": "#37393b",
                    "error-container": "#93000a",
                    "surface-container-low": "#1a1c1d",
                    "surface-container-lowest": "#0c0e10",
                    "inverse-primary": "#4c56af",
                    "secondary-container": "#2c3ea3",
                    "on-secondary-container": "#a8b4ff",
                    "surface-tint": "#bdc2ff",
                    "on-tertiary-container": "#00a6bc",
                    "on-secondary": "#08218a",
                    "on-primary-fixed": "#000767",
                    "on-tertiary": "#00363e",
                    "surface": "#111415",
                    "outline-variant": "#454652",
                    "surface-variant": "#333537",
                    "on-primary-fixed-variant": "#343d96",
                    "on-secondary-fixed": "#00105c",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed": "#001f25",
                    "tertiary-fixed": "#a1efff",
                    "tertiary": "#44d8f1",
                    "background": "#111415",
                    "primary-fixed": "#e0e0ff",
                    "secondary-fixed": "#dee0ff",
                    "tertiary-fixed-dim": "#44d8f1",
                    "tertiary-container": "#00353d",
                    "inverse-surface": "#e2e2e4",
                    "on-primary": "#1b247f",
                    "surface-dim": "#111415"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .wear-os-circle {
            width: 384px;
            height: 384px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .glass-pulse {
            background: rgba(189, 194, 255, 0.05);
            backdrop-filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black flex items-center justify-center min-h-screen">
<!-- Wear OS Circular Container -->
<div class="wear-os-circle bg-surface flex flex-col items-center justify-center p-8 relative shadow-2xl overflow-hidden">
<!-- Background Atmospheric Glow -->
<div class="absolute top-0 right-0 w-32 h-32 bg-tertiary-container opacity-20 blur-[64px] rounded-full"></div>
<div class="absolute bottom-0 left-0 w-32 h-32 bg-primary-container opacity-20 blur-[64px] rounded-full"></div>
<!-- Shared Component: TopAppBar Logic (Integrated for Watch UI) -->
<header class="w-full pt-4 pb-2 flex flex-col items-center justify-center absolute top-2 z-10">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[#bdc2ff] text-base" data-icon="nights_stay">nights_stay</span>
<h1 class="text-[#bdc2ff] font-headline text-[10px] font-bold uppercase tracking-widest">Nocturnal Science</h1>
</div>
</header>
<!-- Main Status Area (Central Canvas) -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Circular Progress/Status Ring (Subtle Tonal Shift) -->
<div class="absolute inset-0 -m-8 flex items-center justify-center">
<svg class="w-64 h-64 transform -rotate-90">
<circle class="text-surface-container-high" cx="128" cy="128" fill="transparent" r="120" stroke="currentColor" stroke-width="2"></circle>
<!-- Partial progress ring to show idle state -->
<circle class="text-primary opacity-40" cx="128" cy="128" fill="transparent" r="120" stroke="currentColor" stroke-dasharray="10 40" stroke-width="3"></circle>
</svg>
</div>
<!-- Disconnected Phone Icon Container -->
<div class="w-20 h-20 rounded-full glass-pulse border border-outline-variant/10 flex items-center justify-center mb-4 shadow-xl">
<div class="relative">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="phonelink_off">phonelink_off</span>
<!-- Small pulsing indicator -->
<div class="absolute -top-1 -right-1 w-3 h-3 bg-primary rounded-full animate-pulse"></div>
</div>
</div>
<!-- Text Content -->
<div class="space-y-1 max-w-[180px]">
<h2 class="font-headline text-lg font-extrabold tracking-tight text-on-surface">Ready to Sync</h2>
<p class="font-body text-[11px] leading-relaxed text-on-surface-variant font-medium">
                    Open app on phone to start session
                </p>
</div>
<!-- Interactive Action (Secondary Button) -->
<button class="mt-6 px-4 py-2 bg-surface-container-high rounded-full flex items-center gap-2 active:scale-95 transition-transform group">
<span class="material-symbols-outlined text-primary text-sm" data-icon="sync">sync</span>
<span class="font-label text-[10px] font-semibold text-on-surface">Waiting...</span>
</button>
</div>
<!-- Floating Decorative Element (Focus Orb Context) -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-tertiary rounded-full shadow-[0_0_8px_#44d8f1]"></div>
<!-- Shared Component: Navigation Drawer Simulation (Footer Actions for Watch) -->
<div class="absolute bottom-4 flex gap-6 text-on-surface-variant/60">
<span class="material-symbols-outlined text-lg hover:text-primary transition-colors cursor-pointer" data-icon="target">target</span>
<span class="material-symbols-outlined text-lg hover:text-primary transition-colors cursor-pointer" data-icon="settings">settings</span>
</div>
</div>
<!-- Background Context Info -->
<div class="fixed bottom-8 left-0 right-0 text-center">
<p class="text-white/20 font-body text-xs">Wear OS Mockup - Nocturne Scholar Prototype</p>
</div>
</body></html>
